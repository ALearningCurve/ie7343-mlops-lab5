main:
  params: [input]
  steps:
  - initialize-config:
      assign:
      - process_data_url: ${input.process_data_url}
      - train_model_url: ${input.train_model_url}
      - batch_predict_url: ${input.batch_predict_url}
      - predict_online_url: ${input.predict_online_url}
      - bucket: ${input.bucket}
      - data_file: ${input.data_file}

  - initiate-data-processing:
      call: http.post
      args:
        url: ${process_data_url}
        auth:
          type: OIDC
        body:
          bucket: ${bucket}
          file: ${data_file}
      result: data_processing_result

  - check-quality-gate:
      switch:
      - condition: ${data_processing_result.body.quality_gate.passed}
        next: initiate-model-training
      - condition: ${not(data_processing_result.body.quality_gate.passed)}
        next: return-quality-gate-failure

  - initiate-model-training:
      call: http.post
      args:
        url: ${train_model_url}
        auth:
          type: OIDC
        body:
          bucket: ${data_processing_result.body.bucket}
          file: ${data_processing_result.body.file}
          run_id: ${data_processing_result.body.run_id}
          quality_gate: ${data_processing_result.body.quality_gate}
      result: model_training_result

  - initiate-batch-serving:
      call: http.post
      args:
        url: ${batch_predict_url}
        auth:
          type: OIDC
        body:
          bucket: ${data_processing_result.body.bucket}
          input_file: ${data_file}
          output_file: ${"predictions_" + data_processing_result.body.run_id + ".csv"}
          run_id: ${data_processing_result.body.run_id}
      result: batch_prediction_result

  - initiate-online-serving:
      call: http.post
      args:
        url: ${predict_online_url}
        auth:
          type: OIDC
        body:
          bucket: ${data_processing_result.body.bucket}
          features: [5.1, 3.5, 1.4, 0.2]
          run_id: ${data_processing_result.body.run_id}
      result: online_prediction

  - return-success:
      return:
        run_id: ${data_processing_result.body.run_id}
        quality_gate: ${data_processing_result.body.quality_gate}
        training: ${model_training_result.body}
        batch_prediction: ${batch_prediction_result.body}
        online_prediction: ${online_prediction.body}

  - return-quality-gate-failure:
      return:
        status: quality_gate_failed
        run_id: ${data_processing_result.body.run_id}
        quality_gate: ${data_processing_result.body.quality_gate}